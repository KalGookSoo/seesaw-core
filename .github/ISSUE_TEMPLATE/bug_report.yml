name: 버그 리포트 - Core
description: Core 모듈의 버그를 보고하세요.
title: "[Core 버그] "
labels: [bug, core]
assignees: []
body:
  - type: input
    id: scenario_title
    attributes:
      label: 시나리오 제목
      description: 어떤 상황의 버그인지 한 줄로 요약하세요.
      placeholder: 예) 사용자 엔티티 저장 시 NullPointerException 발생
    validations:
      required: true
  - type: textarea
    id: given
    attributes:
      label: Given(전제 조건)
      description: 버그 재현 전 상태/데이터/환경.
      placeholder: |
        예)
        - 사용자 엔티티 생성
        - 필수 필드 설정
    validations:
      required: true
  - type: textarea
    id: when
    attributes:
      label: When(행동)
      description: 수행한 구체적 행동을 단계로 작성하세요.
      placeholder: |
        예)
        1) userRepository.save(user) 호출
    validations:
      required: true
  - type: textarea
    id: then_expected
    attributes:
      label: Then(기대 결과)
      description: 정상이라면 어떻게 동작해야 하는지.
      placeholder: |
        예) 사용자 엔티티가 정상적으로 저장되어야 함
    validations:
      required: true
  - type: textarea
    id: but_actual
    attributes:
      label: But(실제 결과)
      description: 실제로 관찰된 결과를 정확히 적어 주세요.
      placeholder: |
        예) NullPointerException 발생
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 스택 트레이스/로그(선택)
      description: 스택 트레이스나 로그를 붙여넣어 주세요.
  - type: checkboxes
    id: checklist
    attributes:
      label: 체크리스트
      options:
        - label: 중복 이슈를 검색했습니다
          required: true
        - label: 재현 절차를 기입했습니다
          required: true
