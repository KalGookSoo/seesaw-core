# GitHub Auto‑generated Release Notes 설정 - SEESAW-CORE
# 문서: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - duplicate
      - question
  categories:
    - title: "✨ 새로운 Core 기능 (New Core Features)"
      labels:
        - enhancement
        - core

    - title: "🐛 Core 버그 수정 (Core Bug Fixes)"
      labels:
        - bug
        - core

    - title: "📝 Core 문서 (Core Documentation)"
      labels:
        - documentation
        - core

    - title: "⚙️ 기타 변경 (Other Changes)"
      labels:
        - "*"
